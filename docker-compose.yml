# QRESPONDER — local-first stack.
#
# By default only the app service runs. Uncomment the `ollama` service (and the
# depends_on/env below) for a fully-local, zero-cloud setup:
#   docker compose run --rm app doctor
#   docker compose run --rm app answer -q /data/q.xlsx --kb /data/kb --qa /data/qa.yaml --out /data/out

services:
  app:
    build: .
    image: qresponder:latest
    env_file:
      - .env
    volumes:
      - ./:/data           # mount your questionnaires, kb, qa.yaml, output here
    working_dir: /data
    # Local path example (uncomment with the ollama service below):
    # environment:
    #   LLM_PROVIDER: openai_compat
    #   LLM_BASE_URL: http://ollama:11434/v1
    #   LLM_API_KEY: ollama
    #   LLM_MODEL: llama3.1
    # depends_on:
    #   - ollama

  # Optional fully-local model server. Pull a model after it starts:
  #   docker compose exec ollama ollama pull llama3.1
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama:/root/.ollama

