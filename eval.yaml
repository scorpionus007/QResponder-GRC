# Golden evaluation set — ships in-repo so `qresponder eval` gives a baseline
# out of the box. Run it against the example KB + Answer Library:
#
#   qresponder eval --set eval.yaml --kb tests/fixtures/kb --qa qa.example.yaml
#   qresponder eval --set eval.yaml --kb tests/fixtures/kb --qa qa.example.yaml --mode retrieval
#
# Item schema: question, key_facts: [...], tags: [...], expected_source? (filename).
# Some items are intentionally unsupported by the KB to exercise coverage/flagging.

- question: "Do you encrypt data at rest?"
  key_facts: ["AES-256"]
  tags: [soc2, encryption]
  expected_source: policy_encryption.md

