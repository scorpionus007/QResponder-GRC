name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with retrieval extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,retrieval,dev]"

      - name: Run test suite (offline, MockProvider — no network)
        run: pytest -q

      - name: Baseline eval against the golden set
        env:
          LLM_PROVIDER: mock
        run: qresponder eval --set eval.yaml --kb tests/fixtures/kb --qa qa.example.yaml
